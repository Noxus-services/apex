[build]
  command = "npm run build"
  publish = "dist"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[functions."daily-planner"]
  schedule = "0 5 * * *"

# /api/gemini is handled by the Edge Function (netlify/edge-functions/gemini.ts)
# which declares config = { path: '/api/gemini' } — no redirect needed.

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
